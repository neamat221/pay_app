<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page </title>

     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />

     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
   
</head>
<body class="bg-gray-150 h-[100vh] ">
    
    <section class=" min-h[50px] flex items-center justify-between p-4 max-w-lg mx-auto mt-10 rounded-2xl bg-orange-50">
        <div class="flex items-center gap-4">
            <img src="assets/Group.png" class="h-[50px]" alt="logo" >

            <div>
                <h2 class="text-xl font-bold"> $ <span id="available-balance">450</span> </h2>
                <p> Available Balance </p>
            </div>
            

        </div>
        
        <div>
            <button class="btn"> <i class="fa-solid fa-arrow-right-from-bracket rotate-180"></i> Logout</button>

        </div>
    </section>

    <div class="max-w-lg mx-auto mt-10 p-4 rounded-2xl bg-orange-50">
        <h1 class="text-2xl font-bold mb-4"> 🔥 Welcome to Payooo!</h1>
        <p>Enjoy easy and convenient financial services with us. Cashout charge is low and </p>
    </div>


    <!--Images -->

    <div class="  h-[300px] mt-5  flex flex-wrap items-center justify-around max-w-lg mx-auto rounded-2xl bg-orange-50 grid grid-cols-3 grid-rows-2 gap-4 ">

        <div id="add-button" class="shadow-sm  h-[100px] w-[130px] rounded-2xl bg-white text-center ml-4 hover:shadow-lg transition-shadow duration-[1000px]">
            <img src="assets/wallet1.png" alt="logo" class="h-[50px] w-[50px] mt-5 ml-5">
            <p>Add Money</p>

        </div>         
        <div id="cash-out-button" class="shadow-sm  h-[100px] w-[130px] rounded-2xl bg-white text-center ml-4 hover:shadow-lg transition-shadow duration-[1000px]">
            <img src="assets/send1.png" alt="logo" class="h-[50px] w-[50px] mt-5 ml-5">
            <p>Cashout</p>

        </div>
        <div class="shadow-sm  h-[100px] w-[130px] rounded-2xl bg-white text-center ml-4 hover:shadow-lg transition-shadow duration-[1000px]">
            <img src="assets/money1.png" alt="logo" class="h-[50px] w-[50px] mt-5 ml-5">
            <p>Transfer Money</p>

        </div>
        <div class="shadow-sm  h-[100px] w-[130px] rounded-2xl bg-white text-center ml-4 hover:shadow-lg transition-shadow duration-[1000px]">
            <img src="assets/bonus1.png" alt="logo" class="h-[50px] w-[50px] mt-5 ml-5">
            <p>Get Bonus</p>

        </div>
        <div class="shadow-sm  h-[100px] w-[130px] rounded-2xl bg-white text-center ml-4 hover:shadow-lg transition-shadow duration-[1000px]"> 
            <img src="assets/purse1.png" alt="logo" class="h-[50px] w-[50px] mt-5 ml-5">
            <p>Pay Bill</p>

        </div>
        <div class="shadow-sm  h-[100px] w-[130px] rounded-2xl bg-white text-center ml-4 hover:shadow-lg transition-shadow duration-[1000px]"> 
            <img src="assets/transaction1.png" alt="logo" class="h-[50px] w-[50px] mt-5 ml-5 ">
            <p>Transactions</p>

        </div>
        

    </div>




    <div class="all-form-section max-w-lg mx-auto mt-6 p-4 rounded-2xl bg-orange-50">
        <!-- add money form -->
         <div id="add-money-parent" >
            <h1 class="text-2xl font-bold mb-4">Add Money</h1>
            <form class="bg-white rounded-2xl p-8 w-[350px]  mt-3 rounded-xl w-full">
                <div class="w-full ">
                    <h2 class="font-bold">Select A Bank</h2>
                        <select id="bank" class="select">
                            <option >Select Bannk</option>
                            <option>AB Bannk</option>
                            <option>Central Bank</option>
                            <option>EBL</option>
                        </select>
                </div>
                <div> 
                    
                    <label class="font-medium" for="account-number">Bank Account Number</label>
                
                <input id="account-number" type="text" placeholder="Enter bank account 11 number" class="input bg-gray-100 mt-3 rounded-xl w-full" />
                </div>
                <div>
                    
                    <label class="font-medium" for="amount">Amount to Add</label>
                <br>
                <input id="add-amount" type="text" placeholder="Enter amount" class="input bg-gray-100 mt-3 rounded-xl w-full" />
                </div>
                <div>
                   
                    <label class="font-medium" for="pin">Pin Number</label>
                <br>
                <input id="pin" type="text" placeholder="Enter 4-digit pin" class="input bg-gray-100 mt-3 rounded-xl w-full" />
                </div>
                <br>
                <button type="button" id="add-money-btn" class="btn btn-primary w-full rounded-xl">Add Money</button>
            </form>
         </div>


        <!--cash out form -->
         <div id="cash-out-parent" style="display: none;">
            <h1 class="text-2xl font-bold mb-4">Cash Out</h1>

            <form class="bg-white rounded-2xl p-8 w-[350px]  mt-3 rounded-xl w-full">
                
                <div> 
                    
                    <label class="font-medium" for="account-number">Agent Number</label>
                
                <input id="withdraw-agent" type="text" placeholder="Enter 11 digit number" class="input bg-gray-100 mt-3 rounded-xl w-full" />
                </div>
                <div>
                    
                    <label class="font-medium" for="amount">Amount</label>
                <br>
                <input id="withdraw-amount" type="text" placeholder="Enter amount to withdraw" class="input bg-gray-100 mt-3 rounded-xl w-full" />
                </div>
                <div>
                   
                    <label class="font-medium" for="pin">Pin Number</label>
                <br> 
                <input id="withdraw-pin" type="text" placeholder="Enter 4-digit pin" class="input bg-gray-100 mt-3 rounded-xl w-full" />
                </div>
                <br>
                <button id="withdraw-btn" type="button" id="" class="btn btn-primary w-full rounded-xl">Withdraw Money</button>
            </form>
         </div>
         

         <!-- transfer money form -->
          <div id="transfer-money-parent" style="display: none;">
            <h1 class="text-2xl font-bold mb-4">Transfer Money</h1>
          </div>

    </div>
     
    
   

     <script src="main.js"></script>
</body>
</html>
